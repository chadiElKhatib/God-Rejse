<!doctype html>
<html lang="da">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>God rejse Lina 🌸</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="background-decoration">
      <span>🌸</span>
      <span>✨</span>
      <span>💗</span>
      <span>🌷</span>
      <span>✨</span>
    </div>

    <main class="container">
      <div id="gameSection" class="card">
        <p class="small-text">Der er en lille besked til dig...</p>

        <h1 id="mainText">Kan du fange knappen? 🌸</h1>

        <p id="messageText">Prøv at trykke på knappen</p>

        <div id="buttonArea" class="button-area">
          <button id="movingButton">Tryk her 💗</button>
        </div>
      </div>

      <div id="countdownSection" class="countdown-section hidden">
        <p class="countdown-text">Din besked kommer om...</p>
        <div id="countdown">3</div>
      </div>

      <div id="finalSection" class="final-section hidden">
        <div id="flyingLetters"></div>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
